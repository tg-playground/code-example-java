spring:
  profiles:
    active: dev
  application:
    name: spring-cloud-zookeeper-configuration
  config:
    import: optional:zookeeper:localhost:2181
  cloud:
    zookeeper:
      config:
        enabled: true
        # Sets the base namespace for configuration values. Node path: /<root>/<spring.application.name>,<profile>/<key-name>. For example, /configuration/spring-cloud-zookeeper/greeting: Hello ZooKeeper!
        root: config
        # Sets the name used by all applications.
        defaultContext: apps
        profileSeparator: ','

